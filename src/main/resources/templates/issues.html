<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Issue Records</h2>

    <a href="/issue-form/new"
       class="btn btn-primary mb-3">
        + Issue Book
    </a>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Student</th>
            <th>Issue Date</th>
            <th>Return Date</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="issue : ${issues}">
            <td th:text="${issue.id}"></td>
            <td th:text="${issue.book.title}"></td>
            <td th:text="${issue.student.name}"></td>
            <td th:text="${issue.issueDate}"></td>
            <td th:text="${issue.returnDate}"></td>

            <td>
                <form th:if="${issue.returnDate == null}"
                      th:action="@{/issue-form/return/{id}(id=${issue.id})}"
                      method="post">

                    <button type="submit"
                            class="btn btn-success btn-sm">
                        Return Book
                    </button>

                </form>

                <span th:if="${issue.returnDate != null}"
                      class="badge bg-secondary">
                    Returned
                </span>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
