<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
</head>
<body style="padding: 30px;">

<h2>Books</h2>

<a href="/books/new" style="background-color: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; display: inline-block; margin-bottom: 15px;">+ Add New Book</a>

<table border="1" style="width:100%; border-collapse: collapse; text-align: left;">
    <thead>
    <tr style="background-color: #f2f2f2;">
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Quantity</th>
        <th>Actions</th> </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.quantity}"></td>
        <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}" style="color: #ffc107; font-weight: bold; margin-right: 15px; text-decoration: none;">Edit</a>
            <a th:href="@{/books/delete/{id}(id=${book.id})}" style="color: #dc3545; font-weight: bold; text-decoration: none;" onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
