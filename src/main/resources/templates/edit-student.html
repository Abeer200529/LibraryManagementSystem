<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4" style="max-width: 500px;">
<h2>Edit Student Details</h2>
<form th:action="@{/students/update/{id}(id=${student.id})}" th:object="${student}" method="POST">
    <input type="hidden" th:field="*{id}" />
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning">Update Changes</button>
    <a href="/students-page" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
